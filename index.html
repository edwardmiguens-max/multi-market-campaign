<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Reports — Live URLs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f6f7;
            --card: #ffffff;
            --border: #e1e3e5;
            --text: #202223;
            --muted: #6d7175;
            --accent: #008060;
            --accent-hover: #006e52;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1.5rem;
        }
        .wrap { max-width: 52rem; margin: 0 auto; }
        header {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.375rem;
            font-weight: 700;
            margin: 0 0 0.35rem;
            letter-spacing: -0.02em;
        }
        .sub { font-size: 0.875rem; color: var(--muted); margin: 0; line-height: 1.5; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            border: none;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 0.625rem 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: #fafbfb; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--border);
            background: #fafbfb;
        }
        .toolbar input {
            flex: 1;
            min-width: 12rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font: inherit;
            font-size: 0.875rem;
        }
        .count { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            text-align: left;
            padding: 0.875rem 1rem;
            vertical-align: top;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        th {
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--muted);
            font-weight: 600;
            background: #fafbfb;
        }
        tr:last-child td { border-bottom: none; }
        .report-name { font-weight: 600; margin-bottom: 0.25rem; }
        .url {
            font-size: 0.75rem;
            color: var(--muted);
            word-break: break-all;
            line-height: 1.45;
        }
        .url a { color: #005bd3; text-decoration: none; }
        .url a:hover { text-decoration: underline; }
        .row-actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
        .btn-sm {
            font-size: 0.75rem;
            padding: 0.4rem 0.65rem;
            border-radius: 0.375rem;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            color: var(--text);
        }
        .btn-sm:hover { background: #f6f6f7; }
        .btn-sm.copied { border-color: var(--accent); color: var(--accent); }
        .state {
            padding: 2.5rem 1rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.875rem;
        }
        .state.error { color: #b42318; }
        .toast {
            position: fixed;
            bottom: 1.25rem;
            right: 1.25rem;
            background: #202223;
            color: #fff;
            font-size: 0.8125rem;
            padding: 0.65rem 1rem;
            border-radius: 0.5rem;
            opacity: 0;
            transform: translateY(0.5rem);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 20;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        @media (max-width: 640px) {
            th:nth-child(3), td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div>
                <h1>Campaign Reports</h1>
                <p class="sub">Published live report URLs — copy and share with stakeholders.</p>
            </div>
            <div class="actions">
                <button type="button" class="btn btn-secondary" id="btn-refresh">Refresh</button>
                <a class="btn btn-primary" href="admin.html">Open Admin</a>
            </div>
        </header>

        <div class="card">
            <div class="toolbar">
                <input type="search" id="search" placeholder="Search campaign name…" autocomplete="off">
                <span class="count" id="count-label">Loading…</span>
            </div>
            <div id="content">
                <div class="state">Loading reports from database…</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://obrjpgucgcrclukkvook.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icmpwZ3VjZ2NyY2x1a2t2b29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzM1OTksImV4cCI6MjA5NzQwOTU5OX0.tN2DmXRTjcvR1azRcvILTxNZEViXkIutVlqYBhbPOq8';

        let allReports = [];

        function slugifyReportName(name) {
            return String(name || 'campaign-report').trim().toLowerCase()
                .replace(/[^\w\s-]+/g, '').replace(/\s+/g, '-')
                .replace(/-+/g, '-').replace(/^-|-$/g, '').slice(0, 80) || 'campaign-report';
        }

        function getReportBasePath() {
            const u = new URL(window.location.href);
            const parts = u.pathname.split('/').filter(Boolean);
            if (parts.length && parts[parts.length - 1].endsWith('.html')) parts.pop();
            return u.origin + (parts.length ? '/' + parts.join('/') : '');
        }

        function getLiveUrl(report) {
            const slug = report.campaign_data?.reportSlug || slugifyReportName(report.report_name);
            return getReportBasePath() + '/' + encodeURIComponent(slug);
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg || 'Copied to clipboard';
            el.classList.add('show');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
        }

        async function copyText(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                if (btn) {
                    const prev = btn.textContent;
                    btn.textContent = 'Copied';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1500);
                }
                showToast('URL copied');
            } catch (_err) {
                window.prompt('Copy this URL:', text);
            }
        }

        function renderTable(reports) {
            const content = document.getElementById('content');
            const countLabel = document.getElementById('count-label');
            countLabel.textContent = reports.length === allReports.length
                ? `${reports.length} report${reports.length === 1 ? '' : 's'}`
                : `${reports.length} of ${allReports.length} reports`;

            if (!reports.length) {
                content.innerHTML = '<div class="state">No published reports found. Publish from Admin to add URLs here.</div>';
                return;
            }

            const rows = reports.map(r => {
                const url = getLiveUrl(r);
                const safeName = String(r.report_name || 'Untitled').replace(/</g, '&lt;');
                return `<tr>
                    <td><div class="report-name">${safeName}</div></td>
                    <td><div class="url"><a href="${url}" target="_blank" rel="noopener">${url}</a></div></td>
                    <td>
                        <div class="row-actions">
                            <button type="button" class="btn-sm" data-copy="${encodeURIComponent(url)}">Copy URL</button>
                            <a class="btn-sm" href="${url}" target="_blank" rel="noopener">Open</a>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            content.innerHTML = `<table>
                <thead><tr><th>Campaign</th><th>Live URL</th><th>Actions</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>`;

            content.querySelectorAll('[data-copy]').forEach(btn => {
                btn.addEventListener('click', () => copyText(decodeURIComponent(btn.getAttribute('data-copy')), btn));
            });
        }

        function filterReports(query) {
            const q = String(query || '').trim().toLowerCase();
            if (!q) return allReports;
            return allReports.filter(r => String(r.report_name || '').toLowerCase().includes(q));
        }

        async function loadReports() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="state">Loading reports from database…</div>';
            try {
                const client = window.supabase.createClient(SB_URL, SB_KEY);
                const { data, error } = await client.from('reports').select('id, report_name, campaign_data').order('report_name', { ascending: true });
                if (error) throw error;
                allReports = data || [];
                renderTable(filterReports(document.getElementById('search').value));
            } catch (err) {
                content.innerHTML = `<div class="state error">Could not load reports.<br><span style="font-size:0.75rem">${err.message || 'Network error'}</span></div>`;
                document.getElementById('count-label').textContent = 'Error';
            }
        }

        document.getElementById('btn-refresh').addEventListener('click', loadReports);
        document.getElementById('search').addEventListener('input', (e) => renderTable(filterReports(e.target.value)));
        loadReports();
    </script>
</body>
</html>
